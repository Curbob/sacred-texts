<!DOCTYPE html>
<html>
<head>
    <title>Inline Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #flipbook { min-height: 400px; border: 2px dashed #ccc; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Inline JavaScript Test</h1>
    <div id="results"></div>
    <div id="flipbook"></div>
    
    <script>
        function addResult(message, success = true) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${success ? 'success' : 'error'}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        addResult('🚀 Starting inline test...');
        
        // Load script dynamically and test
        const script = document.createElement('script');
        script.src = './image-flipbook.min.js';
        script.onload = () => {
            addResult('📦 Script loaded successfully');
            
            setTimeout(() => {
                if (typeof ImageFlipbook !== 'undefined') {
                    addResult('✅ ImageFlipbook class found');
                    
                    try {
                        const flipbook = new ImageFlipbook({
                            container: '#flipbook',
                            title: 'Sacred Texts Test',
                            pages: [
                                './pages/page-01.png',
                                './pages/page-02.png',
                                './pages/page-03.png'
                            ],
                            theme: 'medieval',
                            socialSharing: false,
                            allowDualPage: true,
                            enforceHTTPS: false,
                            preventRightClick: false
                        });
                        addResult('🎉 Sacred Texts flipbook created successfully!');
                    } catch (error) {
                        addResult(`❌ Error creating flipbook: ${error.message}`, false);
                    }
                } else {
                    addResult('❌ ImageFlipbook class not found after script load', false);
                }
            }, 100);
        };
        
        script.onerror = () => {
            addResult('❌ Failed to load script', false);
        };
        
        document.head.appendChild(script);
    </script>
</body>
</html>
