<!DOCTYPE html>
<html>
<head>
    <title>🔍 Sacred Texts Test</title>
    <style>body { font-family: Arial, sans-serif; padding: 20px; }</style>
</head>
<body>
    <h1>🔍 Simple Test</h1>
    <div id="flipbook"></div>
    <div id="debug"></div>
    
    <script>
        console.log('🚀 Starting debug tests...');
        
        // Check immediately
        console.log('window.ImageFlipbook at script load:', typeof window.ImageFlipbook);
        
        // Check after a delay
        setTimeout(() => {
            console.log('window.ImageFlipbook after timeout:', typeof window.ImageFlipbook);
            updateDebug();
        }, 100);
        
        function updateDebug() {
            const debug = document.getElementById('debug');
            debug.innerHTML = '';
            
            // Check what's available
            debug.innerHTML += 'window.ImageFlipbook: ' + typeof window.ImageFlipbook + '<br>';
            debug.innerHTML += 'ImageFlipbook: ' + (typeof ImageFlipbook !== 'undefined' ? 'found' : 'not found') + '<br>';
            
            // List all global properties containing 'flipbook' or 'Image'
            const globals = Object.getOwnPropertyNames(window).filter(name => 
                name.toLowerCase().includes('flipbook') || name.toLowerCase().includes('image')
            );
            debug.innerHTML += 'Globals with flipbook/image: ' + globals.join(', ') + '<br>';
            
            if (typeof window.ImageFlipbook !== 'undefined') {
                debug.innerHTML += '✅ ImageFlipbook found on window<br>';
                
                try {
                    const test = new window.ImageFlipbook({
                        container: '#flipbook',
                        title: 'Test',
                        pages: ['./pages/page-01.png', './pages/page-02.png', './pages/page-03.png'],
                        theme: 'medieval',
                        socialSharing: false
                    });
                    debug.innerHTML += '✅ Flipbook created successfully<br>';
                } catch (e) {
                    debug.innerHTML += '❌ Error creating flipbook: ' + e.message + '<br>';
                }
            } else {
                debug.innerHTML += '❌ ImageFlipbook not found on window<br>';
            }
        }
        
        window.addEventListener('load', updateDebug);
    </script>
    <script src="./image-flipbook.min.js"></script>
</body>
</html>
