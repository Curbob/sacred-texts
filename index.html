<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ The Sacred Texts of Code ✨</title>
    
    <meta name="description" content="Ancient programming wisdom in a beautiful interactive manuscript with dual-page reading mode.">
    
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="The Sacred Texts of Code">
    <meta property="og:description" content="Ancient programming wisdom in a beautiful interactive manuscript">
    <meta property="og:type" content="website">
    <meta property="og:image" content="./pages/page-01.png">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e, #16213e);
            color: #d4af37;
            min-height: 100vh;
        }
        
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(45deg, rgba(139, 69, 19, 0.1), rgba(212, 175, 55, 0.1));
            border-bottom: 3px solid #8B4513;
        }
        
        .title {
            font-size: 2.5em;
            margin: 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
            background: linear-gradient(45deg, #d4af37, #f4d03f);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .main-content {
            padding: 20px;
        }
        
        #sacred-text-container {
            max-width: 1200px;
            margin: 0 auto;
            min-height: 400px;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.3em;
        }
        
        .loading::before {
            content: "📜 ";
            display: inline-block;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 1.8em;
            }
            
            .header {
                padding: 20px;
            }
            
            .main-content {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 class="title">The Sacred Texts of Code</h1>
    </header>

    <main class="main-content">
        <div id="sacred-text-container">
            <div class="loading">
                Preparing the sacred manuscript...
            </div>
        </div>
    </main>

    <script>
        // Simple ImageFlipbook class
        class ImageFlipbook {
            constructor(options = {}) {
                this.config = {
                    container: options.container || '#flipbook-container',
                    pages: options.pages || [],
                    pagePattern: options.pagePattern || null,
                    totalPages: options.totalPages || null,
                    currentPage: options.startPage || 1,
                    theme: options.theme || 'default',
                    chapters: options.chapters || [],
                    chapterStyle: options.chapterStyle || 'buttons',
                    chapterPosition: options.chapterPosition || 'bottom',
                    fullscreenEnabled: options.fullscreenEnabled !== false,
                    socialSharing: options.socialSharing || false,
                    title: options.title || 'Image Flipbook',
                    allowDualPage: options.allowDualPage !== false,
                    imageFit: options.imageFit || 'contain',
                    enforceHTTPS: options.enforceHTTPS !== false,
                    preventRightClick: options.preventRightClick || false,
                    validateImageSources: options.validateImageSources || false,
                    allowedDomains: options.allowedDomains || [],
                    ...options
                };
                
                this.currentPage = this.config.currentPage;
                this.totalPages = this.config.totalPages || this.config.pages.length;
                this.container = null;
                this.pageMode = this.loadPageMode();
                this.init();
            }

            init() {
                this.container = typeof this.config.container === 'string' ? 
                    document.querySelector(this.config.container) : this.config.container;
                
                if (!this.container) {
                    throw new Error(`Container not found: ${this.config.container}`);
                }
                
                this.render();
                this.bindEvents();
                this.loadPage(this.currentPage);
            }

            render() {
                this.container.innerHTML = `
                    <div class="flipbook-wrapper" data-theme="${this.config.theme}">
                        <div class="flipbook-viewer">
                            <div class="page-display" id="page-display">
                                <div class="loading">Loading...</div>
                            </div>
                        </div>
                        <div class="flipbook-controls">
                            <div class="nav-controls">
                                <button class="nav-button" id="prev-btn">← Prev</button>
                                <span class="page-info">
                                    Page <input type="number" id="page-input" min="1" max="${this.totalPages}" value="${this.currentPage}"> of ${this.totalPages}
                                </span>
                                <button class="nav-button" id="next-btn">Next →</button>
                                ${this.config.allowDualPage ? `
                                    <div class="page-mode-toggle" title="Choose your reading view">
                                        <span class="toggle-label">View:</span>
                                        <button class="toggle-btn ${this.pageMode === 'single' ? 'active' : ''}" id="single-page-btn">1 Page</button>
                                        <button class="toggle-btn ${this.pageMode === 'dual' ? 'active' : ''}" id="dual-page-btn">2 Pages</button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                this.injectCSS();
            }

            loadPage(pageNum) {
                if (pageNum < 1 || pageNum > this.totalPages) return;
                
                const display = document.getElementById('page-display');
                if (this.pageMode === 'single' || pageNum === 1) {
                    this.loadSinglePage(pageNum, display);
                } else {
                    this.loadDualPages(pageNum, display);
                }
                
                this.currentPage = pageNum;
                this.updateControls();
            }

            loadSinglePage(pageNum, display) {
                const imagePath = this.getPagePath(pageNum);
                display.innerHTML = `
                    <div class="loading">Loading page ${pageNum}...</div>
                    ${this.config.fullscreenEnabled ? '<button class="fullscreen-btn">⛶ Full</button>' : ''}
                `;
                
                const img = new Image();
                img.onload = () => {
                    display.innerHTML = `
                        <div class="page-container single-page">
                            <img class="page-image" src="${imagePath}" alt="Page ${pageNum}" title="Page ${pageNum}">
                        </div>
                        ${this.config.fullscreenEnabled ? '<button class="fullscreen-btn">⛶ Full</button>' : ''}
                    `;
                    
                    if (this.config.fullscreenEnabled) {
                        display.querySelector('.page-image').onclick = () => this.toggleFullscreen();
                        const fullBtn = display.querySelector('.fullscreen-btn');
                        if (fullBtn) fullBtn.onclick = () => this.toggleFullscreen();
                    }
                };
                
                img.onerror = () => {
                    display.innerHTML = `
                        <div class="loading error">Page ${pageNum} not found</div>
                        ${this.config.fullscreenEnabled ? '<button class="fullscreen-btn">⛶ Full</button>' : ''}
                    `;
                };
                
                img.src = imagePath;
            }

            loadDualPages(pageNum, display) {
                const leftPagePath = this.getPagePath(pageNum);
                const rightPagePath = pageNum < this.totalPages ? this.getPagePath(pageNum + 1) : null;
                
                display.innerHTML = `
                    <div class="loading">Loading pages ${pageNum}${rightPagePath ? ` & ${pageNum + 1}` : ''}...</div>
                    ${this.config.fullscreenEnabled ? '<button class="fullscreen-btn">⛶ Full</button>' : ''}
                `;
                
                const leftImg = new Image();
                const rightImg = rightPagePath ? new Image() : null;
                let loadedCount = 0;
                const totalImages = rightImg ? 2 : 1;
                
                const onImageLoad = () => {
                    loadedCount++;
                    if (loadedCount === totalImages) {
                        const rightPageHtml = rightImg ? 
                            `<img class="page-image right-page" src="${rightPagePath}" alt="Page ${pageNum + 1}" title="Page ${pageNum + 1}">` : '';
                        
                        display.innerHTML = `
                            <div class="page-container dual-page">
                                <img class="page-image left-page" src="${leftPagePath}" alt="Page ${pageNum}" title="Page ${pageNum}">
                                ${rightPageHtml}
                            </div>
                            ${this.config.fullscreenEnabled ? '<button class="fullscreen-btn">⛶ Full</button>' : ''}
                        `;
                        
                        if (this.config.fullscreenEnabled) {
                            display.querySelectorAll('.page-image').forEach(img => {
                                img.onclick = () => this.toggleFullscreen();
                            });
                            const fullBtn = display.querySelector('.fullscreen-btn');
                            if (fullBtn) fullBtn.onclick = () => this.toggleFullscreen();
                        }
                    }
                };
                
                leftImg.onload = onImageLoad;
                leftImg.onerror = onImageLoad;
                leftImg.src = leftPagePath;
                
                if (rightImg) {
                    rightImg.onload = onImageLoad;
                    rightImg.onerror = onImageLoad;
                    rightImg.src = rightPagePath;
                }
            }

            getPagePath(pageNum) {
                if (this.config.pages.length > 0) {
                    return this.config.pages[pageNum - 1];
                } else if (this.config.pagePattern) {
                    const pageStr = pageNum.toString().padStart(2, '0');
                    return this.config.pagePattern.replace('{##}', pageStr);
                } else {
                    throw new Error('No pages or pagePattern specified');
                }
            }

            nextPage() {
                const increment = this.getPageIncrement();
                const nextPage = this.currentPage + increment;
                if (nextPage <= this.totalPages) {
                    this.loadPageSmart(nextPage);
                }
            }

            prevPage() {
                const decrement = this.getPageDecrement();
                const prevPage = this.currentPage - decrement;
                if (prevPage >= 1) {
                    this.loadPageSmart(prevPage);
                }
            }

            loadPageSmart(pageNum) {
                if (document.fullscreenElement) {
                    this.changeFullscreenPage(pageNum);
                } else {
                    this.loadPage(pageNum);
                }
            }

            changeFullscreenPage(pageNum) {
                const fullscreenElement = document.fullscreenElement;
                if (fullscreenElement) {
                    this.currentPage = pageNum;
                    const pageInput = document.getElementById('page-input');
                    if (pageInput) {
                        pageInput.value = pageNum;
                    }
                    this.updateControls();
                    
                    if (this.pageMode === 'single' || pageNum === 1) {
                        this.updateFullscreenSinglePage(pageNum, fullscreenElement);
                    } else {
                        this.updateFullscreenDualPage(pageNum, fullscreenElement);
                    }
                }
            }

            updateFullscreenSinglePage(pageNum, fullscreenElement) {
                const imagePath = this.getPagePath(pageNum);
                fullscreenElement.innerHTML = '<div style="color: white; font-size: 2em; text-align: center;">Loading...</div>';
                
                const img = new Image();
                img.onload = () => {
                    fullscreenElement.innerHTML = `
                        <img src="${imagePath}" alt="Page ${pageNum}" style="
                            max-width: 100vw;
                            max-height: 100vh;
                            object-fit: ${this.config.imageFit};
                            display: block;
                            margin: auto;
                            background: black;
                        ">
                    `;
                };
                
                img.onerror = () => {
                    fullscreenElement.innerHTML = '<div style="color: red; font-size: 2em; text-align: center;">Failed to load page</div>';
                };
                
                img.src = imagePath;
            }

            updateFullscreenDualPage(pageNum, fullscreenElement) {
                const leftPagePath = this.getPagePath(pageNum);
                const rightPagePath = pageNum < this.totalPages ? this.getPagePath(pageNum + 1) : null;
                
                fullscreenElement.innerHTML = '<div style="color: white; font-size: 2em; text-align: center;">Loading...</div>';
                
                const leftImg = new Image();
                const rightImg = rightPagePath ? new Image() : null;
                let loadedCount = 0;
                const totalImages = rightImg ? 2 : 1;
                
                const onImageLoad = () => {
                    loadedCount++;
                    if (loadedCount === totalImages) {
                        const rightImageHtml = rightImg ? `
                            <img src="${rightPagePath}" alt="Page ${pageNum + 1}" style="
                                max-width: 48vw;
                                max-height: 100vh;
                                object-fit: ${this.config.imageFit};
                                margin: 0 1vw;
                            ">
                        ` : '';
                        
                        fullscreenElement.innerHTML = `
                            <div style="
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                height: 100vh;
                                background: black;
                                gap: 2vw;
                            ">
                                <img src="${leftPagePath}" alt="Page ${pageNum}" style="
                                    max-width: 48vw;
                                    max-height: 100vh;
                                    object-fit: ${this.config.imageFit};
                                    margin: 0 1vw;
                                ">
                                ${rightImageHtml}
                            </div>
                        `;
                    }
                };
                
                leftImg.onload = onImageLoad;
                leftImg.onerror = onImageLoad;
                leftImg.src = leftPagePath;
                
                if (rightImg) {
                    rightImg.onload = onImageLoad;
                    rightImg.onerror = onImageLoad;
                    rightImg.src = rightPagePath;
                }
            }

            getPageIncrement() {
                if (this.pageMode === 'single' || this.currentPage === 1) {
                    return 1;
                }
                return (this.currentPage + 1 >= this.totalPages) ? 1 : 2;
            }

            getPageDecrement() {
                if (this.pageMode === 'single') {
                    return 1;
                }
                if (this.currentPage <= 3) {
                    return this.currentPage - 1;
                }
                return 2;
            }

            goToPage(pageNum) {
                const num = parseInt(pageNum);
                if (num >= 1 && num <= this.totalPages) {
                    this.loadPageSmart(num);
                }
            }

            updateControls() {
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                const pageInput = document.getElementById('page-input');
                
                if (prevBtn) prevBtn.disabled = (this.currentPage <= 1);
                if (nextBtn) nextBtn.disabled = (this.currentPage >= this.totalPages);
                if (pageInput) pageInput.value = this.currentPage;
            }

            bindEvents() {
                const prevBtn = document.getElementById('prev-btn');
                const nextBtn = document.getElementById('next-btn');
                const singleBtn = document.getElementById('single-page-btn');
                const dualBtn = document.getElementById('dual-page-btn');
                const pageInput = document.getElementById('page-input');
                
                if (prevBtn) prevBtn.addEventListener('click', () => this.prevPage());
                if (nextBtn) nextBtn.addEventListener('click', () => this.nextPage());
                if (singleBtn) singleBtn.addEventListener('click', () => this.setPageMode('single'));
                if (dualBtn) dualBtn.addEventListener('click', () => this.setPageMode('dual'));
                if (pageInput) pageInput.addEventListener('change', (e) => this.goToPage(e.target.value));
                
                // Keyboard controls
                document.addEventListener('keydown', (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    
                    switch(e.key) {
                        case 'ArrowLeft':
                        case 'ArrowUp':
                            this.prevPage();
                            break;
                        case 'ArrowRight':
                        case 'ArrowDown':
                        case ' ':
                            e.preventDefault();
                            this.nextPage();
                            break;
                        case 'Home':
                            this.goToPage(1);
                            break;
                        case 'End':
                            this.goToPage(this.totalPages);
                            break;
                        case 'f':
                        case 'F':
                            if (this.config.fullscreenEnabled) {
                                this.toggleFullscreen();
                            }
                            break;
                    }
                });
                
                // Handle fullscreen changes
                document.addEventListener('fullscreenchange', () => this.handleFullscreenChange());
                document.addEventListener('webkitfullscreenchange', () => this.handleFullscreenChange());
                document.addEventListener('mozfullscreenchange', () => this.handleFullscreenChange());
                document.addEventListener('msfullscreenchange', () => this.handleFullscreenChange());
                
                window.flipbook = this;
            }

            handleFullscreenChange() {
                const isFullscreen = document.fullscreenElement || 
                                   document.webkitFullscreenElement || 
                                   document.mozFullScreenElement || 
                                   document.msFullscreenElement;
                
                if (!isFullscreen) {
                    // Exited fullscreen - reload the current page in normal view
                    this.loadPage(this.currentPage);
                }
            }

            setPageMode(mode) {
                if (mode === this.pageMode) return;
                if (mode === 'dual' && !this.config.allowDualPage) return;
                
                this.pageMode = mode;
                this.savePageMode();
                
                const singleBtn = document.getElementById('single-page-btn');
                const dualBtn = document.getElementById('dual-page-btn');
                
                if (singleBtn && dualBtn) {
                    singleBtn.classList.toggle('active', mode === 'single');
                    dualBtn.classList.toggle('active', mode === 'dual');
                }
                
                this.loadPage(this.currentPage);
            }

            loadPageMode() {
                if (!this.config.allowDualPage) return 'single';
                
                const saved = localStorage.getItem('flipbook-page-mode');
                if (saved === 'single' || saved === 'dual') return saved;
                
                return window.innerWidth >= 768 ? 'dual' : 'single';
            }

            savePageMode() {
                localStorage.setItem('flipbook-page-mode', this.pageMode);
            }

            toggleFullscreen() {
                const pageContainer = document.querySelector('.page-container');
                if (!pageContainer) return;
                
                if (!document.fullscreenElement) {
                    const method = pageContainer.requestFullscreen || 
                                 pageContainer.webkitRequestFullscreen || 
                                 pageContainer.mozRequestFullScreen || 
                                 pageContainer.msRequestFullscreen;
                    if (method) method.call(pageContainer);
                } else {
                    const method = document.exitFullscreen || 
                                 document.webkitExitFullscreen || 
                                 document.mozCancelFullScreen || 
                                 document.msExitFullscreen;
                    if (method) method.call(document);
                }
            }

            injectCSS() {
                if (document.getElementById('flipbook-styles')) return;
                
                const style = document.createElement('style');
                style.id = 'flipbook-styles';
                style.textContent = `
                    .flipbook-wrapper {
                        font-family: 'Georgia', serif;
                        max-width: 1000px;
                        margin: 0 auto;
                        padding: 20px;
                        color: #333;
                    }
                    
                    .flipbook-wrapper[data-theme="medieval"] {
                        background: linear-gradient(45deg, #1a1a2e, #16213e);
                        color: #d4af37;
                        border-radius: 15px;
                        padding: 30px;
                    }
                    
                    .page-display {
                        position: relative;
                        background: #f4f1e8;
                        width: 80vw;
                        max-width: 1200px;
                        height: 60vh;
                        max-height: 600px;
                        border: 3px solid #8B4513;
                        border-radius: 10px;
                        overflow: hidden;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        margin: 0 auto;
                    }
                    
                    .page-container {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        width: 100%;
                        height: 100%;
                        gap: 10px;
                    }
                    
                    .page-container.single-page { gap: 0; }
                    .page-container.dual-page { gap: 10px; }
                    
                    .page-image {
                        object-fit: contain;
                        cursor: pointer;
                        transition: transform 0.2s ease;
                    }
                    
                    .single-page .page-image {
                        max-width: 100%;
                        max-height: 100%;
                        object-fit: ${this.config.imageFit};
                    }
                    
                    .dual-page .page-image {
                        max-width: 48%;
                        max-height: 100%;
                        border: 1px solid #ccc;
                        border-radius: 5px;
                        object-fit: ${this.config.imageFit};
                    }
                    
                    .page-image:hover { transform: scale(1.02); }
                    
                    .loading {
                        font-size: 1.2em;
                        color: #666;
                        text-align: center;
                    }
                    
                    .loading.error { color: #d32f2f; }
                    
                    .fullscreen-btn {
                        position: absolute;
                        top: 10px;
                        right: 10px;
                        background: rgba(0,0,0,0.7);
                        color: white;
                        border: none;
                        padding: 8px 12px;
                        border-radius: 5px;
                        cursor: pointer;
                        font-size: 14px;
                    }
                    
                    .fullscreen-btn:hover { background: rgba(0,0,0,0.9); }
                    
                    .flipbook-controls {
                        text-align: center;
                        margin-top: 20px;
                    }
                    
                    .nav-controls {
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 15px;
                        margin-bottom: 15px;
                        flex-wrap: wrap;
                    }
                    
                    .nav-button {
                        background: linear-gradient(45deg, #8B4513, #A0522D);
                        border: 2px solid #d4af37;
                        color: #d4af37;
                        font-weight: bold;
                        padding: 10px 20px;
                        border-radius: 5px;
                        cursor: pointer;
                        font-size: 16px;
                        transition: all 0.3s ease;
                    }
                    
                    .nav-button:hover:not(:disabled) {
                        background: linear-gradient(45deg, #A0522D, #CD853F);
                        box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
                        transform: translateY(-2px);
                    }
                    
                    .nav-button:disabled {
                        background: #ccc;
                        color: #666;
                        cursor: not-allowed;
                        transform: none;
                        border-color: #999;
                    }
                    
                    .page-info {
                        font-size: 16px;
                        font-weight: bold;
                        color: #d4af37;
                    }
                    
                    #page-input {
                        width: 60px;
                        text-align: center;
                        border: 1px solid #ccc;
                        border-radius: 3px;
                        padding: 2px 5px;
                        margin: 0 5px;
                    }
                    
                    .page-mode-toggle {
                        display: flex;
                        align-items: center;
                        gap: 8px;
                        font-size: 14px;
                    }
                    
                    .toggle-label {
                        font-weight: bold;
                        color: #d4af37;
                    }
                    
                    .toggle-btn {
                        background: rgba(139, 69, 19, 0.3);
                        color: #d4af37;
                        border: 2px solid #8B4513;
                        padding: 6px 12px;
                        border-radius: 5px;
                        cursor: pointer;
                        font-size: 13px;
                        transition: all 0.3s ease;
                        min-width: 60px;
                    }
                    
                    .toggle-btn:hover {
                        background: rgba(139, 69, 19, 0.5);
                        border-color: #d4af37;
                    }
                    
                    .toggle-btn.active {
                        background: linear-gradient(45deg, #4A148C, #6A1B9A);
                        border-color: #d4af37;
                        color: #d4af37;
                        font-weight: bold;
                    }
                    
                    .toggle-btn.active:hover {
                        background: linear-gradient(45deg, #6A1B9A, #8E24AA);
                    }
                    
                    @media (max-width: 768px) {
                        .page-display {
                            width: 95vw;
                            height: 50vh;
                        }
                        
                        .nav-controls {
                            gap: 12px;
                            padding: 15px 10px;
                        }
                        
                        .nav-button {
                            font-size: 16px;
                            padding: 12px 18px;
                            min-width: 44px;
                            min-height: 44px;
                        }
                        
                        .page-mode-toggle {
                            flex-basis: 100%;
                            margin-top: 15px;
                            justify-content: center;
                            gap: 15px;
                        }
                        
                        .toggle-btn {
                            font-size: 15px;
                            padding: 12px 20px;
                            min-width: 80px;
                            min-height: 44px;
                        }
                    }
                `;
                document.head.appendChild(style);
            }
        }

        // Initialize the Sacred Texts
        window.addEventListener('load', () => {
            console.log('🚀 Page loaded, initializing Sacred Texts...');
            
            try {
                const sacredTexts = new ImageFlipbook({
                    container: '#sacred-text-container',
                    title: 'The Sacred Texts of Code',
                    pagePattern: './pages/page-{##}.png',
                    totalPages: 68,
                    theme: 'medieval',
                    socialSharing: false,
                    allowDualPage: true,
                    fullscreenEnabled: true,
                    preventRightClick: true,
                    imageFit: 'contain'
                });
                
                console.log('✅ Sacred Texts initialized successfully!');
            } catch (error) {
                console.error('❌ Error initializing Sacred Texts:', error);
                document.getElementById('sacred-text-container').innerHTML = `
                    <div style="color: #dc3545; text-align: center; padding: 40px;">
                        ❌ Error loading Sacred Texts: ${error.message}<br>
                        <small>Please refresh the page or try again later.</small>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
